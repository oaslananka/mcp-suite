trigger:
  tags:
    include:
      - v*
      - registry-v*

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '10'
  TURBO_CACHE_DIR: $(Pipeline.Workspace)/.turbo
  MCP_PUBLISHER_VERSION: 'v1.5.0'

stages:
  - stage: Validate
    displayName: Validate release candidate
    jobs:
      - job: Lint
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm turbo run lint
            displayName: ESLint
            env:
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)
          - script: pnpm run format:check
            displayName: Prettier check

      - job: Typecheck
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm turbo run typecheck
            displayName: TypeScript strict check
            env:
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)

      - job: Audit
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm audit --audit-level=moderate
            displayName: npm security audit

      - job: Knip
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm knip
            displayName: Dead code / dead dependency check

      - job: Smithery
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm run validate:smithery
            displayName: Validate Smithery manifests

      - job: RegistryMetadata
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm run validate:registry
            displayName: Validate MCP Registry metadata

      - job: PublishDryRun
        condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm changeset publish --dry-run
            displayName: Verify publish would succeed

  - stage: BuildRelease
    displayName: Build release artifacts
    dependsOn: Validate
    jobs:
      - job: BuildPackages
        steps:
          - template: ../templates/node-setup.yml

          - task: Cache@2
            inputs:
              key: 'turbo | "$(Agent.OS)" | turbo.json'
              restoreKeys: |
                turbo | "$(Agent.OS)"
              path: $(TURBO_CACHE_DIR)
            displayName: Restore Turborepo cache

          - script: pnpm turbo run build
            displayName: Build packages
            env:
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)

          - script: pnpm run test:coverage
            displayName: Run tests
            env:
              NODE_ENV: test
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)

          - script: pnpm docs:api
            displayName: Generate API docs

          - publish: docs/api
            artifact: typedoc-api
            displayName: Publish Typedoc artifact

          - script: |
              if [[ "${BUILD_SOURCEBRANCH}" == refs/tags/registry-v* ]]; then
                VERSION=${BUILD_SOURCEBRANCH#refs/tags/registry-v}
                MODE=metadata-only
              else
                VERSION=${BUILD_SOURCEBRANCH#refs/tags/v}
                MODE=package-release
              fi
              echo "##vso[task.setvariable variable=RELEASE_VERSION]$VERSION"
              echo "##vso[task.setvariable variable=REGISTRY_RELEASE_MODE]$MODE"
            displayName: Extract release version

  - stage: PublishPackages
    displayName: Publish npm packages
    dependsOn: BuildRelease
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    jobs:
      - job: PublishNpm
        steps:
          - template: ../templates/node-setup.yml
          - script: bash scripts/publish-packages.sh
            displayName: Publish with Changesets
            env:
              NPM_TOKEN: $(NPM_TOKEN)
              GITHUB_TOKEN: $(GITHUB_TOKEN)

  - stage: PublishMcpRegistryRelease
    displayName: Publish Official MCP Registry metadata for package release
    dependsOn: PublishPackages
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    jobs:
      - job: PublishRegistry
        steps:
          - template: ../templates/node-setup.yml
          - script: bash scripts/publish-mcp-registry.sh
            displayName: Publish server.json metadata
            env:
              MCP_GITHUB_TOKEN: $(MCP_GITHUB_TOKEN)
              MCP_PUBLISHER_VERSION: $(MCP_PUBLISHER_VERSION)
              MCP_REGISTRY_URL: $(MCP_REGISTRY_URL)
              MCP_REGISTRY_MODE: package-release

  - stage: PublishMcpRegistryMetadata
    displayName: Publish Official MCP Registry metadata-only update
    dependsOn: BuildRelease
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/registry-v')
    jobs:
      - job: PublishRegistryMetadataOnly
        steps:
          - template: ../templates/node-setup.yml
          - script: |
              export MCP_REGISTRY_MODE=metadata-only
              export MCP_REGISTRY_VERSION="${BUILD_SOURCEBRANCH#refs/tags/registry-v}"
              export MCP_REGISTRY_TARGETS="${MCP_REGISTRY_TARGETS}"
              bash scripts/publish-mcp-registry.sh
            displayName: Publish registry-only prerelease metadata
            env:
              MCP_GITHUB_TOKEN: $(MCP_GITHUB_TOKEN)
              MCP_PUBLISHER_VERSION: $(MCP_PUBLISHER_VERSION)
              MCP_REGISTRY_URL: $(MCP_REGISTRY_URL)
              MCP_REGISTRY_TARGETS: $(MCP_REGISTRY_TARGETS)

  - stage: BuildElectron
    displayName: Build desktop artifacts
    dependsOn: BuildRelease
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    jobs:
      - job: BuildLinux
        steps:
          - template: ../templates/node-setup.yml
          - script: cd apps/lab && pnpm exec electron-builder --linux
            displayName: Build Linux binary
          - publish: apps/lab/release
            artifact: lab-linux

      - job: BuildWindows
        steps:
          - template: ../templates/node-setup.yml
          - script: cd apps/lab && pnpm exec electron-builder --win
            displayName: Build Windows binary
          - publish: apps/lab/release
            artifact: lab-windows

      - job: BuildMac
        steps:
          - template: ../templates/node-setup.yml
          - script: cd apps/lab && pnpm exec electron-builder --mac
            displayName: Build macOS binary
          - publish: apps/lab/release
            artifact: lab-macos

  - stage: Release
    displayName: Publish GitHub release and containers
    dependsOn:
      - PublishPackages
      - PublishMcpRegistryRelease
      - BuildElectron
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    jobs:
      - job: PublishArtifacts
        steps:
          - template: ../templates/github-release.yml
          - script: bash scripts/sync-to-github.sh
            displayName: Sync release state to GitHub
            env:
              GITHUB_TOKEN: $(GITHUB_TOKEN)
              GITHUB_REPO: $(GITHUB_REPO)
