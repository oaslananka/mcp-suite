trigger:
  branches:
    include:
      - '*'
  paths:
    exclude:
      - docs/**
      - '**/*.md'

pool:
  vmImage: ubuntu-latest

variables:
  PNPM_VERSION: '10'
  TURBO_CACHE_DIR: $(Pipeline.Workspace)/.turbo

stages:
  - stage: Validate
    displayName: Validate
    jobs:
      - job: Lint
        displayName: ESLint and formatting
        strategy:
          matrix:
            node20:
              NODE_VERSION: '20.x'
            node22:
              NODE_VERSION: '22.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm turbo run lint
            displayName: ESLint
            env:
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)
          - script: pnpm run format:check
            displayName: Prettier check

      - job: Typecheck
        displayName: TypeScript strictness
        strategy:
          matrix:
            node20:
              NODE_VERSION: '20.x'
            node22:
              NODE_VERSION: '22.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm turbo run typecheck
            displayName: TypeScript strict check
            env:
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)

      - job: Audit
        displayName: Dependency audit
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm audit --audit-level=moderate
            displayName: npm security audit

      - job: Knip
        displayName: Dead code check
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm knip
            displayName: Dead code / dead dependency check

      - job: Smithery
        displayName: Validate Smithery metadata
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm run validate:smithery
            displayName: Validate Smithery manifests

      - job: RegistryMetadata
        displayName: Validate MCP Registry metadata
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm run validate:registry
            displayName: Validate server.json metadata

      - job: PublishDryRun
        displayName: Publish dry-run
        condition: or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: pnpm changeset publish --dry-run
            displayName: Verify publish would succeed

  - stage: Build
    displayName: Build and test
    dependsOn: Validate
    jobs:
      - job: BuildAndTest
        displayName: Build workspace and publish reports
        strategy:
          matrix:
            node20:
              NODE_VERSION: '20.x'
            node22:
              NODE_VERSION: '22.x'
        steps:
          - template: ../templates/node-setup.yml

          - task: Cache@2
            inputs:
              key: 'turbo | "$(Agent.OS)" | turbo.json'
              restoreKeys: |
                turbo | "$(Agent.OS)"
              path: $(TURBO_CACHE_DIR)
            displayName: Restore Turborepo cache

          - script: pnpm turbo run build
            displayName: Build all packages
            env:
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)

          - script: pnpm run test:coverage
            displayName: Run tests with coverage
            env:
              NODE_ENV: test
              TURBO_TOKEN: $(TURBO_TOKEN)
              TURBO_TEAM: $(TURBO_TEAM)

          - script: pnpm docs:api
            displayName: Generate API docs

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/test-results/junit.xml'
              testRunTitle: mcp-suite test suite
            displayName: Publish test results
            condition: always()

          - task: PublishCodeCoverageResults@2
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: '**/coverage/cobertura-coverage.xml'
              reportDirectory: '**/coverage'
            displayName: Publish coverage report
            condition: always()

          - publish: docs/api
            artifact: typedoc-api
            displayName: Publish Typedoc artifact
            condition: and(succeeded(), eq(variables['NODE_VERSION'], '20.x'))

  - stage: Docker
    displayName: Container images
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImages
        displayName: Build service containers
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - template: ../templates/docker-build.yml
            parameters:
              serviceName: forge
              dockerfile: packages/forge/Dockerfile
              repository: mcp-suite/forge
          - template: ../templates/docker-build.yml
            parameters:
              serviceName: atlas
              dockerfile: packages/atlas/Dockerfile
              repository: mcp-suite/atlas
          - template: ../templates/docker-build.yml
            parameters:
              serviceName: sentinel
              dockerfile: packages/sentinel/Dockerfile
              repository: mcp-suite/sentinel
          - template: ../templates/docker-build.yml
            parameters:
              serviceName: composer
              dockerfile: packages/composer/Dockerfile
              repository: mcp-suite/composer
          - template: ../templates/docker-build.yml
            parameters:
              serviceName: observatory
              dockerfile: packages/observatory/Dockerfile
              repository: mcp-suite/observatory

      - job: ComposeSmoke
        displayName: Smoke production compose stack
        dependsOn: BuildImages
        variables:
          NODE_VERSION: '20.x'
        steps:
          - template: ../templates/node-setup.yml
          - script: docker compose -f docker-compose.prod.yml up -d forge atlas observatory
            displayName: Start production compose stack
          - script: pnpm run smoke:prod
            displayName: Verify production health endpoints
          - script: docker compose -f docker-compose.prod.yml down -v
            displayName: Tear down production compose stack
            condition: always()
