trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: 20.x
  PNPM_VERSION: "10"

stages:
  - stage: Build
    displayName: Main branch build
    jobs:
      - job: BuildWorkspace
        steps:
          - template: ../templates/node-setup.yml

          - script: pnpm turbo run build
            displayName: Build packages

          - script: pnpm run test
            displayName: Run tests
            env:
              NODE_ENV: test

          - publish: apps/lab/dist
            artifact: lab-electron-build

          - publish: packages/forge/dist
            artifact: forge-dist

  - stage: DockerBuild
    displayName: Container images
    dependsOn: Build
    jobs:
      - job: BuildCoreImages
        steps:
          - template: ../templates/docker-build.yml
            parameters:
              serviceName: forge
              dockerfile: packages/forge/Dockerfile
              repository: mcp-suite/forge

          - template: ../templates/docker-build.yml
            parameters:
              serviceName: atlas
              dockerfile: packages/atlas/Dockerfile
              repository: mcp-suite/atlas

          - template: ../templates/docker-build.yml
            parameters:
              serviceName: observatory
              dockerfile: packages/observatory/Dockerfile
              repository: mcp-suite/observatory

  - stage: Mirror
    displayName: Mirror to GitHub
    dependsOn: DockerBuild
    jobs:
      - job: PushMirror
        steps:
          - checkout: self
            persistCredentials: true

          - script: bash scripts/sync-to-github.sh
            displayName: Push mirror and tags
            env:
              GITHUB_TOKEN: $(GITHUB_TOKEN)
              GITHUB_REPO: $(GITHUB_REPO)
