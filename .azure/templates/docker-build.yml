parameters:
  - name: serviceName
    type: string
  - name: dockerfile
    type: string
  - name: repository
    type: string

steps:
  - task: Docker@2
    displayName: Build ${{ parameters.serviceName }} image
    inputs:
      command: build
      containerRegistry: AzureContainerRegistry
      repository: ${{ parameters.repository }}
      dockerfile: ${{ parameters.dockerfile }}
      tags: |
        $(Build.BuildId)
        latest-dev

  - task: Docker@2
    displayName: Push ${{ parameters.serviceName }} image
    inputs:
      command: push
      containerRegistry: AzureContainerRegistry
      repository: ${{ parameters.repository }}
      tags: |
        $(Build.BuildId)
        latest-dev
