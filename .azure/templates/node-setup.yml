steps:
  - script: |
      set -euo pipefail
      node_version=""
      pnpm_version=""
      while read -r tool version; do
        case "${tool}" in
          node) node_version="${version}" ;;
          pnpm) pnpm_version="${version}" ;;
        esac
      done < .tool-versions
      [[ -n "${node_version}" ]]
      [[ -n "${pnpm_version}" ]]
      echo "##vso[task.setvariable variable=NODE_VERSION]${node_version}"
      echo "##vso[task.setvariable variable=PNPM_VERSION]${pnpm_version}"
      echo "Selected Node ${node_version} and pnpm ${pnpm_version}"
    displayName: Read canonical toolchain

  - task: NodeTool@0
    inputs:
      versionSpec: $(NODE_VERSION)
    displayName: Set up Node

  - script: |
      set -euo pipefail
      corepack enable
      corepack prepare pnpm@$(PNPM_VERSION) --activate
      TOOLCHAIN_PNPM_VERSION="$(PNPM_VERSION)" node scripts/verify-toolchain.mjs --runtime
    displayName: Enable and verify pnpm

  - task: Cache@2
    inputs:
      key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
      restoreKeys: |
        pnpm | "$(Agent.OS)"
      path: $(Pipeline.Workspace)/.pnpm-store
    displayName: Restore pnpm cache

  - script: |
      set -euo pipefail
      pnpm config set store-dir $(Pipeline.Workspace)/.pnpm-store
      pnpm install --frozen-lockfile --ignore-scripts
      pnpm rebuild better-sqlite3 electron esbuild
      pnpm run toolchain:test
      pnpm run toolchain:check
      pnpm run toolchain:check:native
    displayName: Install dependencies and verify toolchain
