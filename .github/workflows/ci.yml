name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm rebuild better-sqlite3 electron esbuild

      - name: Verify native module ABI
        shell: bash
        run: pnpm run toolchain:check:native

      - name: Verify toolchain contract
        shell: bash
        run: |
          set -euo pipefail
          pnpm run toolchain:test
          pnpm run toolchain:check

      - name: Format check
        shell: bash
        run: |
          set -euo pipefail
          pnpm run format:check

      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          pnpm run lint

      - name: Typecheck
        shell: bash
        run: |
          set -euo pipefail
          pnpm run typecheck

      - name: Test coverage
        shell: bash
        run: |
          set -euo pipefail
          pnpm run test:coverage

      - name: Security
        shell: bash
        run: |
          set -euo pipefail
          pnpm run security

      - name: Dead code detection
        shell: bash
        run: |
          set -euo pipefail
          pnpm run knip

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          pnpm run build

      - name: Production smoke
        shell: bash
        run: |
          set -euo pipefail
          pnpm run smoke:prod

      - name: Metadata and release preflight
        shell: bash
        run: |
          set -euo pipefail
          pnpm run validate:registry
          pnpm run validate:smithery
          pnpm run release:dry-run

  compatibility:
    name: Compatibility (${{ matrix.surface }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - surface: ubuntu-24.04 / Node 24.18.0
            os: ubuntu-24.04
            lab-build: false
          - surface: windows-2025 / Node 24.18.0
            os: windows-2025
            lab-build: false
          - surface: macos-15 Lab Electron / Node 24.18.0
            os: macos-15
            lab-build: true
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts && pnpm rebuild better-sqlite3 electron esbuild

      - name: Verify native module ABI
        run: pnpm run toolchain:check:native

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Lab Electron build
        if: ${{ matrix.lab-build }}
        run: pnpm --filter @oaslananka/lab run build

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Compose config
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.prod.yml config

      - name: Build production images
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml build forge atlas observatory
