name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm rebuild better-sqlite3 electron esbuild

      - name: Verify native module ABI
        shell: bash
        run: pnpm run toolchain:check:native

      - name: Verify toolchain contract
        shell: bash
        run: |
          set -euo pipefail
          pnpm run toolchain:test
          pnpm run toolchain:check

      - name: Format check
        shell: bash
        run: |
          set -euo pipefail
          pnpm run format:check

      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          pnpm run lint

      - name: Typecheck
        shell: bash
        run: |
          set -euo pipefail
          pnpm run typecheck

      - name: Test coverage
        shell: bash
        run: |
          set -euo pipefail
          pnpm run test:coverage

      - name: Toolchain trust-boundary coverage
        shell: bash
        run: |
          set -euo pipefail
          pnpm run toolchain:test:coverage

      - name: Enforce patch coverage
        shell: bash
        env:
          PATCH_COVERAGE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          pnpm run patch:coverage -- --base "$PATCH_COVERAGE_BASE" --target 80

      - name: Discover Codecov reports
        id: codecov-coverage-reports
        if: ${{ !cancelled() }}
        shell: bash
        run: node scripts/codecov-reports.mjs

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && steps.codecov-coverage-reports.outputs.coverage_files != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ${{ steps.codecov-coverage-reports.outputs.coverage_files }}
          disable_search: true
          disable_telem: true
          fail_ci_if_error: true
          name: mcp-suite-coverage

      - name: Security
        shell: bash
        run: |
          set -euo pipefail
          pnpm run security

      - name: Dead code detection
        shell: bash
        run: |
          set -euo pipefail
          pnpm run knip

      - name: Build
        shell: bash
        env:
          CODECOV_BUNDLE_ANALYSIS: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          pnpm run build

      - name: Verify npm package tarballs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf test-results/npm-release
          mkdir -p test-results/npm-release/npm
          node scripts/pack-npm-artifacts.mjs test-results/npm-release/npm
          sha256sum test-results/npm-release/npm/*.tgz > test-results/npm-release/SHA256SUMS.txt
          node scripts/verify-npm-artifacts.mjs \
            --artifacts-dir test-results/npm-release/npm \
            --checksums test-results/npm-release/SHA256SUMS.txt \
            --output test-results/npm-release/npm-release-manifest.json
          node scripts/smoke-npm-packages.mjs \
            --source tarballs \
            --artifacts-dir test-results/npm-release/npm \
            --manifest test-results/npm-release/npm-release-manifest.json

      - name: Install Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          ./node_modules/.bin/playwright install --with-deps chromium

      - name: UI end-to-end, accessibility, and performance gates
        shell: bash
        run: |
          set -euo pipefail
          pnpm run test:ui

      - name: Discover Codecov test results
        id: codecov-test-results
        if: ${{ !cancelled() }}
        shell: bash
        run: node scripts/codecov-reports.mjs

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && steps.codecov-test-results.outputs.test_result_files != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          report_type: test_results
          files: ${{ steps.codecov-test-results.outputs.test_result_files }}
          disable_search: true
          disable_telem: true
          fail_ci_if_error: true
          name: mcp-suite-test-results

      - name: Package and bundle size budgets
        shell: bash
        run: |
          set -euo pipefail
          pnpm run size

      - name: Production smoke
        shell: bash
        run: |
          set -euo pipefail
          pnpm run smoke:prod

      - name: Metadata and release preflight
        shell: bash
        run: |
          set -euo pipefail
          pnpm run validate:registry
          pnpm run validate:smithery
          pnpm run release:dry-run

  compatibility:
    name: Compatibility (${{ matrix.surface }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - surface: ubuntu-24.04 / Node 24.18.0
            os: ubuntu-24.04
            lab-build: false
          - surface: windows-2025 / Node 24.18.0
            os: windows-2025
            lab-build: false
          - surface: macos-15 Lab Electron / Node 24.18.0
            os: macos-15
            lab-build: true
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts && pnpm rebuild better-sqlite3 electron esbuild

      - name: Verify native module ABI
        run: pnpm run toolchain:check:native

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Lab Electron build
        if: ${{ matrix.lab-build }}
        run: pnpm --filter @oaslananka/lab run build

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Compose config
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.prod.yml config

      - name: Build production images
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml build forge atlas observatory
