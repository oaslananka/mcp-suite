name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Run release automation
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  assets:
    name: Build Release Assets
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm install --frozen-lockfile
          pnpm run ci
          mkdir -p artifacts/npm artifacts/provenance
          node scripts/pack-npm-artifacts.mjs artifacts/npm
          npm sbom --all --sbom-format spdx > artifacts/sbom.spdx.json
          sha256sum artifacts/npm/*.tgz artifacts/sbom.spdx.json > artifacts/SHA256SUMS.txt

      - name: Attest npm package artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: "artifacts/npm/*.tgz"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" artifacts/npm/*.tgz artifacts/sbom.spdx.json artifacts/SHA256SUMS.txt

      - name: Post-release state
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release-state.mjs --json
