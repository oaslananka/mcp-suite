name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tags:
        description: "Comma or newline separated existing release tags to upload assets to"
        required: false
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write # Create component releases and upload release metadata.
      pull-requests: write # Maintain the release-please pull request.
      issues: write # Update release-please issue references.
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      atlas_tag: ${{ steps.release.outputs['packages/atlas--tag_name'] }}
      bridge_tag: ${{ steps.release.outputs['packages/bridge--tag_name'] }}
      composer_tag: ${{ steps.release.outputs['packages/composer--tag_name'] }}
      forge_tag: ${{ steps.release.outputs['packages/forge--tag_name'] }}
      observatory_tag: ${{ steps.release.outputs['packages/observatory--tag_name'] }}
      sentinel_tag: ${{ steps.release.outputs['packages/sentinel--tag_name'] }}
      shared_tag: ${{ steps.release.outputs['packages/shared--tag_name'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Run release automation
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  assets:
    name: Build Release Assets
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.release_tags != '') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write # Upload verified assets to component releases.
      id-token: write # Mint the identity used for artifact provenance.
      attestations: write # Store GitHub attestations for release assets.
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Build release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TURBO_TELEMETRY_DISABLED: "1"
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm rebuild better-sqlite3 esbuild
          pnpm run toolchain:check:native
          pnpm --filter "./packages/*" run build
          mkdir -p artifacts/npm
          node scripts/pack-npm-artifacts.mjs artifacts/npm
          gh api "repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" --jq ".sbom" > artifacts/sbom.spdx.json
          sha256sum artifacts/npm/*.tgz artifacts/sbom.spdx.json > artifacts/SHA256SUMS.txt
          node scripts/verify-npm-artifacts.mjs \
            --artifacts-dir artifacts/npm \
            --checksums artifacts/SHA256SUMS.txt \
            --output artifacts/npm-release-manifest.json
          sha256sum artifacts/npm-release-manifest.json >> artifacts/SHA256SUMS.txt
          node scripts/smoke-npm-packages.mjs \
            --source tarballs \
            --artifacts-dir artifacts/npm \
            --manifest artifacts/npm-release-manifest.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: |
            artifacts/npm/*.tgz
            artifacts/npm-release-manifest.json
            artifacts/sbom.spdx.json
            artifacts/SHA256SUMS.txt

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAGS_INPUT: ${{ inputs.release_tags }}
          ATLAS_TAG: ${{ needs.release.outputs.atlas_tag }}
          BRIDGE_TAG: ${{ needs.release.outputs.bridge_tag }}
          COMPOSER_TAG: ${{ needs.release.outputs.composer_tag }}
          FORGE_TAG: ${{ needs.release.outputs.forge_tag }}
          OBSERVATORY_TAG: ${{ needs.release.outputs.observatory_tag }}
          SENTINEL_TAG: ${{ needs.release.outputs.sentinel_tag }}
          SHARED_TAG: ${{ needs.release.outputs.shared_tag }}
        run: |
          set -euo pipefail
          node <<'NODE' > "${RUNNER_TEMP}/release-tags.txt"
          const explicitTags = process.env.RELEASE_TAGS_INPUT ?? "";
          const releaseTags = explicitTags.trim()
            ? explicitTags.split(/[,\s]+/)
            : [
                process.env.ATLAS_TAG,
                process.env.BRIDGE_TAG,
                process.env.COMPOSER_TAG,
                process.env.FORGE_TAG,
                process.env.OBSERVATORY_TAG,
                process.env.SENTINEL_TAG,
                process.env.SHARED_TAG,
              ];
          const uniqueTags = [
            ...new Set(
              releaseTags
                .map((tag) => tag?.trim())
                .filter((tag) => tag && tag !== "null" && tag !== "undefined")
            ),
          ];
          if (uniqueTags.length === 0) {
            console.error("No release tags resolved for asset upload.");
            process.exit(1);
          }
          process.stdout.write(`${uniqueTags.join("\n")}\n`);
          NODE

          while IFS= read -r release_tag; do
            echo "Uploading release assets to ${release_tag}"
            gh release upload "${release_tag}" \
              artifacts/npm/*.tgz \
              artifacts/npm-release-manifest.json \
              artifacts/sbom.spdx.json \
              artifacts/SHA256SUMS.txt \
              --clobber
          done < "${RUNNER_TEMP}/release-tags.txt"

      - name: Post-release state
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release-state.mjs --json
