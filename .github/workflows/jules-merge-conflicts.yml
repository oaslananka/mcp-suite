# Generated by @google/jules-fleet init
# This workflow scans PRs for overlapping file changes.
name: Conflict Detection

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan-overlaps:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for overlapping changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          payload=$(jq -cn \
            --argjson pr "$PR_NUMBER" \
            --arg repo "$REPO" \
            --arg base "$BASE_REF" \
            '{prs: [$pr], repo: $repo, base: $base}')

          npx -y \
            --package=@google/jules-merge \
            --package=@google/jules-sdk \
            --package=@modelcontextprotocol/sdk \
            jules-merge scan --json "$payload"
