---
# yamllint disable rule:line-length

name: Containers

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - atlas-v*
      - bridge-v*
      - composer-v*
      - forge-v*
      - observatory-v*
      - sentinel-v*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mcp-suite
  GH_CLI_VERSION: 2.96.0
  GH_CLI_SHA256: 83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60
  PLATFORMS: linux/amd64,linux/arm64
  QEMU_IMAGE: tonistiigi/binfmt@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3

jobs:
  validate:
    name: Container Validate (${{ matrix.image }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false }}
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: atlas
            dockerfile: ./packages/atlas/Dockerfile
          - image: bridge
            dockerfile: ./packages/bridge/Dockerfile
          - image: composer
            dockerfile: ./packages/composer/Dockerfile
          - image: forge
            dockerfile: ./packages/forge/Dockerfile
          - image: observatory
            dockerfile: ./packages/observatory/Dockerfile
          - image: sentinel
            dockerfile: ./packages/sentinel/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          image: ${{ env.QEMU_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build image for vulnerability scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: local/mcp-suite-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=container-${{ matrix.image }}
          push: false
          sbom: false
          provenance: false

      - name: Scan image for GitHub Code Scanning
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/mcp-suite-${{ matrix.image }}:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          exit-code: "0"
          timeout: 10m

      - name: Upload Trivy SARIF
        if: ${{ always() && !cancelled() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - name: Enforce HIGH and CRITICAL vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/mcp-suite-${{ matrix.image }}:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
          timeout: 10m
          skip-setup-trivy: true

      - name: Validate multi-architecture build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          outputs: type=cacheonly
          cache-from: type=gha,scope=container-${{ matrix.image }}
          push: false
          sbom: false
          provenance: false

  publish:
    name: Container Publish (${{ matrix.image }})
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: atlas
            dockerfile: ./packages/atlas/Dockerfile
            description: Registry API and catalog UI for discovering MCP servers.
          - image: bridge
            dockerfile: ./packages/bridge/Dockerfile
            description: OpenAPI and schema-first MCP server generator.
          - image: composer
            dockerfile: ./packages/composer/Dockerfile
            description: Aggregation proxy for multiple backend MCP servers.
          - image: forge
            dockerfile: ./packages/forge/Dockerfile
            description: Pipeline engine for orchestrating MCP tools.
          - image: observatory
            dockerfile: ./packages/observatory/Dockerfile
            description: Metrics, traces, and anomaly detection dashboard.
          - image: sentinel
            dockerfile: ./packages/sentinel/Dockerfile
            description: Zero-trust security proxy with policy and audit controls.
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          image: ${{ env.QEMU_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install checksum-pinned GitHub CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="/tmp/gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          extract_dir="/tmp/gh_${GH_CLI_VERSION}_linux_amd64"
          curl --fail --silent --show-error --location \
            --proto '=https' --proto-redir '=https' \
            "https://github.com/cli/cli/releases/download/v${GH_CLI_VERSION}/gh_${GH_CLI_VERSION}_linux_amd64.tar.gz" \
            --output "${archive}"
          printf '%s  %s\n' "${GH_CLI_SHA256}" "${archive}" | sha256sum --check
          tar --extract --gzip --file "${archive}" --directory /tmp
          sudo install --mode 0755 "${extract_dir}/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.title=mcp-suite-${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and publish multi-architecture image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=container-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=container-${{ matrix.image }}
          sbom: true
          provenance: mode=max

      - name: Sign published digest with GitHub OIDC
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify keyless signature identity
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/containers.yml@${GITHUB_REF}"
          cosign verify \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"

      - name: Create registry-backed GitHub provenance attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify GitHub provenance attestation
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}" \
            --bundle-from-oci \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/containers.yml" \
            --source-ref "${GITHUB_REF}" \
            --source-digest "${GITHUB_SHA}"

      - name: Verify published architectures
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: |
          set -euo pipefail
          manifest="$(docker buildx imagetools inspect --raw "${IMAGE}@${DIGEST}")"
          jq -e '
            [.manifests[].platform | select(.os == "linux") | .architecture]
            | (index("amd64") != null and index("arm64") != null)
          ' <<< "${manifest}" >/dev/null
          docker buildx imagetools inspect "${IMAGE}@${DIGEST}"
  smoke-published:
    name: Published Image Smoke
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: ${{ always() && needs.publish.result == 'success' }}
    permissions:
      contents: read
      packages: read
    env:
      MCP_SUITE_IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull published images
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.prod.yml \
            -f docker-compose.published.yml \
            pull forge atlas observatory bridge composer sentinel

      - name: Exercise every published image CLI
        shell: bash
        run: |
          set -euo pipefail
          for image in atlas bridge composer forge observatory sentinel; do
            docker run --rm \
              "${IMAGE_PREFIX}-${image}:${MCP_SUITE_IMAGE_TAG}" \
              node "packages/${image}/dist/cli.js" --help >/dev/null
          done

      - name: Start published services
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.prod.yml \
            -f docker-compose.published.yml \
            up -d --no-build forge atlas observatory

      - name: Wait for container health
        shell: bash
        run: |
          set -euo pipefail
          for service in forge atlas observatory; do
            container_id="$(docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.published.yml \
              ps -q "${service}")"
            if [[ -z "${container_id}" ]]; then
              echo "Missing container for ${service}" >&2
              exit 1
            fi

            for _ in $(seq 1 60); do
              status="$(docker inspect --format '{{.State.Health.Status}}' "${container_id}")"
              if [[ "${status}" == "healthy" ]]; then
                break
              fi
              if [[ "${status}" == "unhealthy" ]]; then
                echo "${service} became unhealthy" >&2
                exit 1
              fi
              sleep 2
            done

            status="$(docker inspect --format '{{.State.Health.Status}}' "${container_id}")"
            if [[ "${status}" != "healthy" ]]; then
              echo "${service} did not become healthy" >&2
              exit 1
            fi
          done

      - name: Exercise published service health endpoints
        shell: bash
        env:
          FORGE_HEALTH_URL: http://127.0.0.1:4000/health
          ATLAS_HEALTH_URL: http://127.0.0.1:4003/health
          OBSERVATORY_HEALTH_URL: http://127.0.0.1:4006/health
        run: node scripts/smoke-prod-health.mjs

      - name: Collect published service logs
        if: ${{ always() }}
        shell: bash
        run: |
          docker compose \
            -f docker-compose.prod.yml \
            -f docker-compose.published.yml \
            ps || true
          docker compose \
            -f docker-compose.prod.yml \
            -f docker-compose.published.yml \
            logs --no-color || true

      - name: Tear down published services
        if: ${{ always() }}
        shell: bash
        run: |
          docker compose \
            -f docker-compose.prod.yml \
            -f docker-compose.published.yml \
            down -v --remove-orphans

  promote-main:
    name: Promote Main Image (${{ matrix.image }})
    needs: [publish, smoke-published]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ always() && needs.publish.result == 'success' && needs.smoke-published.result == 'success' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [atlas, bridge, composer, forge, observatory, sentinel]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote verified digest to main and latest
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
        run: |
          set -euo pipefail
          source_ref="${IMAGE}:sha-${GITHUB_SHA}"
          docker buildx imagetools create \
            --tag "${IMAGE}:main" \
            --tag "${IMAGE}:latest" \
            "${source_ref}"
          docker buildx imagetools inspect "${IMAGE}:main"
          docker buildx imagetools inspect "${IMAGE}:latest"

  promote-release:
    name: Promote Component Release (${{ matrix.image }})
    needs: [publish, smoke-published]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ always() && needs.publish.result == 'success' && needs.smoke-published.result == 'success' && github.ref_type == 'tag' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: atlas
            release_prefix: atlas-v
          - image: bridge
            release_prefix: bridge-v
          - image: composer
            release_prefix: composer-v
          - image: forge
            release_prefix: forge-v
          - image: observatory
            release_prefix: observatory-v
          - image: sentinel
            release_prefix: sentinel-v
    steps:
      - name: Set up Docker Buildx
        if: ${{ startsWith(github.ref_name, matrix.release_prefix) }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        if: ${{ startsWith(github.ref_name, matrix.release_prefix) }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote verified digest to version aliases
        if: ${{ startsWith(github.ref_name, matrix.release_prefix) }}
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_PREFIX: ${{ matrix.release_prefix }}
        run: |
          set -euo pipefail
          version="${REF_NAME#"${RELEASE_PREFIX}"}"
          if [[ ! "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid component release tag: ${REF_NAME}" >&2
            exit 1
          fi

          aliases=("${IMAGE}:${version}")
          if [[ -z "${BASH_REMATCH[4]:-}" ]]; then
            aliases+=("${IMAGE}:${BASH_REMATCH[1]}.${BASH_REMATCH[2]}")
            aliases+=("${IMAGE}:${BASH_REMATCH[1]}")
          fi

          create_args=()
          for alias in "${aliases[@]}"; do
            create_args+=(--tag "${alias}")
          done
          docker buildx imagetools create \
            "${create_args[@]}" \
            "${IMAGE}:sha-${GITHUB_SHA}"

          for alias in "${aliases[@]}"; do
            docker buildx imagetools inspect "${alias}"
          done
